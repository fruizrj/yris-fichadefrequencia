<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ficha de Frequência — Yris Saúde</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.19.0/fonts/tabler-icons.min.css" />
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --border: #e2e2e0; --border2: #d0d0cc;
    --text: #1a1a18; --text2: #6b6b67; --text3: #a3a39e;
    --radius: 8px; --radius-lg: 12px;
    --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #0F6E56;
    --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #A32D2D;
    --orange: #BA7517; --orange-bg: #FAEEDA; --orange-text: #854F0B;
    --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --gray-bg: #F1EFE8; --gray-text: #5F5E5A;
    --pink-bg: #FBEAF0; --pink-text: #993556;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#1c1c1a; --bg2:#252522; --border:#3a3a36; --border2:#4a4a46;
      --text:#f0f0ec; --text2:#a3a39e; --text3:#6b6b67;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; flex-wrap: wrap; }
  .logo { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .logo span { color: var(--green); }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .controls select { border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; font-size: 14px; background: var(--bg); color: var(--text); cursor: pointer; }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: var(--radius); font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--text2); transition: background 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }
  .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .tab { padding: 6px 18px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; cursor: pointer; background: var(--bg); color: var(--text2); transition: all 0.15s; }
  .tab.active { background: var(--bg2); color: var(--text); font-weight: 500; border-color: var(--border2); }
  .jornada-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); background: var(--bg2); border-radius: var(--radius); padding: 6px 12px; margin-bottom: 1.25rem; }
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-value.ok { color: var(--green); } .stat-value.warn { color: var(--orange); } .stat-value.bad { color: var(--red); }
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-lg); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--bg2); }
  th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; border-bottom: 1px solid var(--border); }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg2); }
  .dim td { opacity: 0.38; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-ok      { background: var(--green-bg);  color: var(--green-text); }
  .badge-falta   { background: var(--red-bg);    color: var(--red-text); }
  .badge-folga   { background: var(--gray-bg);   color: var(--gray-text); }
  .badge-ferias  { background: var(--orange-bg); color: var(--orange-text); }
  .badge-half    { background: var(--blue-bg);   color: var(--blue-text); }
  .badge-feriado { background: var(--pink-bg);   color: var(--pink-text); }
  .saldo-pos { color: var(--green); font-weight: 500; font-size: 12px; }
  .saldo-neg { color: var(--red);   font-weight: 500; font-size: 12px; }
  .saldo-zer { color: var(--text3); font-size: 12px; }
  .edit-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 3px 7px; cursor: pointer; color: var(--text2); font-size: 13px; }
  .edit-btn:hover { background: var(--bg2); }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1.25rem; }
  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 1.5rem; width: 100%; max-width: 360px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .field input, .field select { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; font-size: 14px; background: var(--bg); color: var(--text); }
  .field input:focus, .field select:focus { outline: none; border-color: var(--border2); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <div class="logo">Yris <span>Saúde</span> &nbsp;·&nbsp; Frequência</div>
    <div class="controls">
      <select id="selMes"></select>
      <select id="selAno"></select>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn" onclick="exportarCSV()"><i class="ti ti-download"></i> Exportar CSV</button>
      <button class="btn btn-primary" onclick="abrirModal()"><i class="ti ti-plus"></i> Lançar</button>
    </div>
  </div>

  <div class="tabs" id="tabsFunc"></div>
  <div class="jornada-badge" id="jornadaInfo"></div>
  <div class="summary" id="summary"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:72px">Data</th>
          <th style="width:36px">Dia</th>
          <th style="width:115px">Status</th>
          <th style="width:70px">Entrada</th>
          <th style="width:70px">Saída</th>
          <th style="width:80px">Saldo</th>
          <th>Obs</th>
          <th style="width:40px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="legend" id="legend"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitulo">Lançar registro</h3>
    <div class="field">
      <label>Unidade</label>
      <select id="mFunc"></select>
    </div>
    <div class="field">
      <label>Nome da funcionária</label>
      <input type="text" id="mNome" placeholder="Nome completo" />
    </div>
    <div class="field">
      <label>Data</label>
      <input type="date" id="mData" />
    </div>
    <div class="field">
      <label>Status</label>
      <select id="mStatus">
        <option value="presente">Presente</option>
        <option value="falta">Falta</option>
        <option value="folga">Folga</option>
        <option value="ferias">Férias</option>
        <option value="meio">Meio período</option>
      </select>
    </div>
    <div class="field">
      <label>Entrada</label>
      <input type="time" id="mEntrada" />
    </div>
    <div class="field">
      <label>Saída</label>
      <input type="time" id="mSaida" />
    </div>
    <div class="field">
      <label>Observação</label>
      <input type="text" id="mObs" placeholder="opcional" />
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
const SK = 'yris_freq_v3';
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

const JORNADAS = {
  barra:    { entrada:'08:00', saida:'17:30', almoco:60, sabado:false, entradaSab:'', saidaSab:'', label:'Seg–Sex  |  8h às 17h30 (almoço 12h–13h)' },
  botafogo: { entrada:'08:00', saida:'17:00', almoco:0,  sabado:true,  entradaSab:'08:00', saidaSab:'12:00', label:'Seg–Sex  |  8h às 17h   +   Sáb  8h às 12h' }
};

const FUNCIONARIAS = [
  { id:'func_barra',    unidade:'barra',    nomeDefault:'Funcionária — Barra da Tijuca' },
  { id:'func_botafogo', unidade:'botafogo', nomeDefault:'Funcionária — Botafogo' }
];

const STATUS_META = {
  presente: { label:'Presente',     cls:'badge-ok' },
  falta:    { label:'Falta',        cls:'badge-falta' },
  folga:    { label:'Folga',        cls:'badge-folga' },
  ferias:   { label:'Férias',       cls:'badge-ferias' },
  meio:     { label:'Meio período', cls:'badge-half' },
  feriado:  { label:'Feriado',      cls:'badge-feriado' }
};

let registros=[], nomes={}, funcIdx=0, mes, ano, feriados;

function loadData(){ try{ const d=JSON.parse(localStorage.getItem(SK)||'{}'); registros=d.registros||[]; nomes=d.nomes||{}; }catch(e){ registros=[]; nomes={}; } }
function saveData(){ try{ localStorage.setItem(SK,JSON.stringify({registros,nomes})); }catch(e){} }

function pascoa(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),n=Math.floor((h+l-7*m+114)/31),p=(h+l-7*m+114)%31+1;
  return new Date(y,n-1,p);
}
function ymd(dt){ return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function addDays(dt,n){ const d=new Date(dt); d.setDate(d.getDate()+n); return d; }

function feriadosDoAno(y){
  const f=new Set();
  const add=(m,d)=>f.add(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  // Nacionais fixos
  add(1,1); add(4,21); add(5,1); add(9,7); add(10,12); add(11,2); add(11,15); add(11,20); add(12,25);
  // Estaduais RJ
  add(1,20); add(4,23); add(10,28);
  // Móveis
  const p=pascoa(y);
  f.add(ymd(p));                        // Páscoa
  f.add(ymd(addDays(p,-2)));            // Sexta-feira Santa
  f.add(ymd(addDays(p,-48)));           // Carnaval (segunda)
  f.add(ymd(addDays(p,-47)));           // Carnaval (terça)
  f.add(ymd(addDays(p, 60)));           // Corpus Christi
  return f;
}

function hhmm2min(t){ if(!t) return null; const [h,m]=t.split(':').map(Number); return h*60+m; }
function minToStr(min){
  const neg=min<0; const abs=Math.abs(min);
  const h=Math.floor(abs/60), m=abs%60;
  return (neg?'−':'+')+h+'h'+(m?String(m).padStart(2,'0')+'min':'');
}

function calcSaldo(reg, unidade, dow){
  if(!reg||!reg.entrada||!reg.saida) return null;
  const j=JORNADAS[unidade];
  const trab=hhmm2min(reg.saida)-hhmm2min(reg.entrada)-(unidade==='barra'?j.almoco:0);
  let esp=0;
  if(reg.status==='presente'||reg.status==='meio'){
    if(unidade==='botafogo'&&dow===6) esp=hhmm2min(j.saidaSab)-hhmm2min(j.entradaSab);
    else esp=hhmm2min(j.saida)-hhmm2min(j.entrada)-j.almoco;
  }
  return trab-esp;
}

function getNome(id){ return nomes[id]||FUNCIONARIAS.find(f=>f.id===id).nomeDefault; }
function diasNoMes(m,a){ return new Date(a,m+1,0).getDate(); }
function getReg(id,data){ return registros.find(r=>r.funcId===id&&r.data===data); }

function initSelects(){
  const sM=document.getElementById('selMes'), sA=document.getElementById('selAno');
  const now=new Date(); mes=now.getMonth(); ano=now.getFullYear();
  MESES.forEach((m,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=m; if(i===mes) o.selected=true; sM.appendChild(o); });
  for(let y=ano-1;y<=ano+2;y++){ const o=document.createElement('option'); o.value=y; o.textContent=y; if(y===ano) o.selected=true; sA.appendChild(o); }
  sM.onchange=()=>{ mes=+sM.value; render(); };
  sA.onchange=()=>{ ano=+sA.value; feriados=feriadosDoAno(ano); render(); };
}

function initTabs(){
  const el=document.getElementById('tabsFunc');
  FUNCIONARIAS.forEach((f,i)=>{
    const b=document.createElement('button'); b.className='tab'+(i===0?' active':'');
    b.textContent=f.unidade==='barra'?'Barra da Tijuca':'Botafogo';
    b.onclick=()=>{ funcIdx=i; document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i)); render(); };
    el.appendChild(b);
  });
}

function initModalFunc(){
  const sel=document.getElementById('mFunc');
  FUNCIONARIAS.forEach(f=>{ const o=document.createElement('option'); o.value=f.id; o.textContent=f.unidade==='barra'?'Barra da Tijuca':'Botafogo'; sel.appendChild(o); });
}

function render(){
  const func=FUNCIONARIAS[funcIdx];
  const j=JORNADAS[func.unidade];
  const total=diasNoMes(mes,ano);
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  let presentes=0,faltas=0,folgas=0,saldoTotal=0;

  document.getElementById('jornadaInfo').innerHTML=`<i class="ti ti-clock"></i> ${j.label}`;

  for(let d=1;d<=total;d++){
    const data=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(ano,mes,d).getDay();
    const isSab=dow===6, isSun=dow===0;
    const isFer=feriados.has(data);
    const reg=getReg(func.id,data);

    let status=reg?reg.status:null;
    if(!status&&isFer) status='feriado';

    const inativo=isSun||(isSab&&func.unidade==='barra')||isFer;

    if(status==='presente') presentes++;
    else if(status==='falta') faltas++;
    else if(status==='folga'||status==='ferias') folgas++;

    let saldoMin=null, saldoHtml='<span style="color:var(--text3)">—</span>';
    if(reg&&(reg.status==='presente'||reg.status==='meio')&&reg.entrada&&reg.saida){
      saldoMin=calcSaldo(reg,func.unidade,dow);
      saldoTotal+=saldoMin;
      saldoHtml=`<span class="${saldoMin>0?'saldo-pos':saldoMin<0?'saldo-neg':'saldo-zer'}">${minToStr(saldoMin)}</span>`;
    }

    const badgeHtml=status
      ?`<span class="badge ${STATUS_META[status]?.cls||'badge-folga'}">${STATUS_META[status]?.label||status}</span>`
      :'<span style="color:var(--text3);font-size:11px">—</span>';

    const tr=document.createElement('tr');
    if(inativo) tr.className='dim';

    tr.innerHTML=`
      <td>${String(d).padStart(2,'0')}/${String(mes+1).padStart(2,'0')}</td>
      <td style="color:var(--text2)">${DIAS[dow]}</td>
      <td>${badgeHtml}</td>
      <td style="color:var(--text2)">${reg&&reg.entrada||'—'}</td>
      <td style="color:var(--text2)">${reg&&reg.saida||'—'}</td>
      <td>${saldoHtml}</td>
      <td style="color:var(--text2);font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis">${reg&&reg.obs||''}</td>
      <td>${!inativo||reg?`<button class="edit-btn" onclick="editarDia('${data}',${dow})" title="Editar"><i class="ti ti-edit"></i></button>`:''}</td>`;
    tbody.appendChild(tr);
  }

  const diasUteis=Array.from({length:total},(_,i)=>i+1).filter(d=>{
    const data=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(ano,mes,d).getDay();
    if(func.unidade==='barra') return dow!==0&&dow!==6&&!feriados.has(data);
    return dow!==0&&!feriados.has(data);
  }).length;

  const pct=diasUteis>0?Math.round((presentes/diasUteis)*100):0;
  document.getElementById('summary').innerHTML=`
    <div class="stat"><div class="stat-label">Dias úteis</div><div class="stat-value">${diasUteis}</div></div>
    <div class="stat"><div class="stat-label">Presentes</div><div class="stat-value ok">${presentes}</div></div>
    <div class="stat"><div class="stat-label">Faltas</div><div class="stat-value ${faltas>0?'bad':''}">${faltas}</div></div>
    <div class="stat"><div class="stat-label">Folgas/Férias</div><div class="stat-value">${folgas}</div></div>
    <div class="stat"><div class="stat-label">Saldo do mês</div><div class="stat-value ${saldoTotal>=0?'ok':'bad'}">${saldoTotal===0?'0h':minToStr(saldoTotal)}</div></div>
    <div class="stat"><div class="stat-label">Frequência</div><div class="stat-value ${pct>=90?'ok':pct>=75?'warn':'bad'}">${pct}%</div></div>`;

  document.getElementById('legend').innerHTML=Object.entries(STATUS_META).map(([,v])=>`<span class="badge ${v.cls}">${v.label}</span>`).join('');
}

function editarDia(data,dow){
  const func=FUNCIONARIAS[funcIdx];
  const j=JORNADAS[func.unidade];
  const reg=getReg(func.id,data);
  const isSab=dow===6;
  const ep=(func.unidade==='botafogo'&&isSab)?j.entradaSab:j.entrada;
  const sp=(func.unidade==='botafogo'&&isSab)?j.saidaSab:j.saida;
  document.getElementById('mFunc').value=func.id;
  document.getElementById('mNome').value=getNome(func.id);
  document.getElementById('mData').value=data;
  document.getElementById('mStatus').value=reg?reg.status:'presente';
  document.getElementById('mEntrada').value=reg?(reg.entrada||ep):ep;
  document.getElementById('mSaida').value=reg?(reg.saida||sp):sp;
  document.getElementById('mObs').value=reg?(reg.obs||''):'';
  document.getElementById('overlay').classList.add('open');
}

function abrirModal(){
  const func=FUNCIONARIAS[funcIdx];
  const j=JORNADAS[func.unidade];
  const now=new Date();
  document.getElementById('mFunc').value=func.id;
  document.getElementById('mNome').value=getNome(func.id);
  document.getElementById('mData').value=`${ano}-${String(mes+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  document.getElementById('mStatus').value='presente';
  document.getElementById('mEntrada').value=j.entrada;
  document.getElementById('mSaida').value=j.saida;
  document.getElementById('mObs').value='';
  document.getElementById('overlay').classList.add('open');
}

function fecharModal(){ document.getElementById('overlay').classList.remove('open'); }

function salvar(){
  const funcId=document.getElementById('mFunc').value;
  const nome=document.getElementById('mNome').value.trim();
  const data=document.getElementById('mData').value;
  const status=document.getElementById('mStatus').value;
  const entrada=document.getElementById('mEntrada').value;
  const saida=document.getElementById('mSaida').value;
  const obs=document.getElementById('mObs').value;
  if(!data) return;
  if(nome) nomes[funcId]=nome;
  const idx=registros.findIndex(r=>r.funcId===funcId&&r.data===data);
  const rec={funcId,data,status,entrada,saida,obs};
  if(idx>=0) registros[idx]=rec; else registros.push(rec);
  saveData(); fecharModal(); render();
}

function exportarCSV(){
  const func=FUNCIONARIAS[funcIdx];
  const j=JORNADAS[func.unidade];
  const nome=getNome(func.id);
  const total=diasNoMes(mes,ano);
  let csv=`Funcionária:,${nome}\nUnidade:,${func.unidade==='barra'?'Barra da Tijuca':'Botafogo'}\nJornada:,${j.label}\nMês:,${MESES[mes]} ${ano}\n\n`;
  csv+='Data,Dia,Status,Entrada,Saída,Saldo,Observação\n';
  let acc=0;
  for(let d=1;d<=total;d++){
    const data=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(ano,mes,d).getDay();
    const reg=getReg(func.id,data);
    let status=reg?reg.status:''; if(!status&&feriados.has(data)) status='feriado';
    let sStr='';
    if(reg&&(reg.status==='presente'||reg.status==='meio')&&reg.entrada&&reg.saida){
      const s=calcSaldo(reg,func.unidade,dow); acc+=s; sStr=minToStr(s);
    }
    csv+=`${String(d).padStart(2,'0')}/${String(mes+1).padStart(2,'0')}/${ano},${DIAS[dow]},${STATUS_META[status]?.label||status||''},${reg?reg.entrada||'':''},${reg?reg.saida||'':''},${sStr},"${reg?reg.obs||'':''}"\n`;
  }
  csv+=`\n,,,,Saldo total:,${minToStr(acc)},\n`;
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`frequencia_${func.unidade}_${MESES[mes]}_${ano}.csv`;
  a.click();
}

document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) fecharModal(); });
loadData(); initSelects(); feriados=feriadosDoAno(ano); initTabs(); initModalFunc(); render();
</script>
</body>
